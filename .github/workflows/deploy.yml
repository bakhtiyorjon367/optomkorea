name: Deploy optomkorea API to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest        # GitHub's server — 14GB free, build here

    steps:
      # ── 1. Checkout & Build on GitHub runner ────────────
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NestJS API
        run: pnpm --filter @koruz/api build

      # Reason: apps/mobile/.env is gitignored, so Vite would otherwise inline
      # an empty VITE_TELEGRAM_BOT_NAME and tree-shake the Telegram login button
      # out of the bundle entirely.
      - name: Write mobile .env (Vite build-time vars)
        run: |
          cat > apps/mobile/.env << 'ENVEOF'
          VITE_API_URL=/api
          VITE_TELEGRAM_BOT_NAME=optomkorean_bot
          ENVEOF

      - name: Build React frontend
        run: pnpm --filter @koruz/mobile build

      # ── 2. Write .env locally (before upload) ───────────
      - name: Write .env file
        run: |
          cat > apps/api/.env << 'ENVEOF'
          PORT=${{ secrets.PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          CLIENT_URL=${{ secrets.CLIENT_URL }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME=${{ secrets.MONGODB_DB_NAME }}
          ENVEOF

      # ── 3. Set up SSH ────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Upload only dist + config to EC2 (no node_modules!) ──
      - name: Upload build to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} \
            "mkdir -p /home/ubuntu/optomkorea/apps/api /home/ubuntu/optomkorea/apps/mobile/dist"

          # Copy compiled dist, package.json, .env — NOT node_modules
          rsync -az --delete \
            apps/api/dist/ \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/optomkorea/apps/api/dist/

          rsync -az \
            apps/api/package.json \
            apps/api/.env \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/optomkorea/apps/api/

          # Copy frontend dist
          rsync -az --delete \
            apps/mobile/dist/ \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/optomkorea/apps/mobile/dist/

          # Copy workspace root files needed for pnpm
          rsync -az \
            package.json \
            pnpm-workspace.yaml \
            pnpm-lock.yaml \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/optomkorea/

          # Copy shared internal packages (if api depends on them)
          rsync -az --delete \
            packages/ \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/optomkorea/packages/

      # ── 5. Install prod-only deps on EC2 & restart PM2 ──
      - name: Install & restart on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
          set -e
          export PATH="/usr/bin:$PATH"
          cd /home/ubuntu/optomkorea

          # Install ONLY api production dependencies (no devDeps, no mobile)
          CI=true pnpm install --filter @koruz/api... --frozen-lockfile

          # PM2: restart if running, start fresh if not
          if pm2 list | grep -q "optomkorea"; then
            pm2 restart optomkorea --update-env
          else
            pm2 start /home/ubuntu/optomkorea/apps/api/dist/main.js \
              --name "optomkorea" \
              --cwd /home/ubuntu/optomkorea/apps/api
          fi

          pm2 save
          echo "✅ Deployed successfully"
          ENDSSH