name: Deploy optomkorea to EC2

on:
  push:
    branches: [main]          # auto-deploy on every push to main

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Install & (optionally) test
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      # - name: Run tests          ← uncomment when you add tests
      #   run: npm test

  # ─────────────────────────────────────────
  # JOB 2 — Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    needs: build               # only runs if build job passes
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e    # stop immediately on any error

            APP_DIR=/home/ubuntu/optomkorea

            # ── Clone repo on first deploy, pull on subsequent ──
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone ${{ secrets.GITHUB_REPO_URL }} $APP_DIR
            fi

            cd $APP_DIR
            git pull origin main

            # ── Write .env from GitHub Secrets ──────────────────
            cat > .env << 'ENVEOF'
            PORT=${{ secrets.PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            CLIENT_URL=${{ secrets.CLIENT_URL }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_DB_NAME=${{ secrets.MONGODB_DB_NAME }}
            ENVEOF

            # ── Install production dependencies ──────────────────
            npm ci --omit=dev

            # ── PM2: restart if running, start fresh if not ──────
            if pm2 list | grep -q "optomkorea"; then
              pm2 restart optomkorea
            else
              pm2 start npm --name "optomkorea" -- start
            fi

            pm2 save
            echo "✅ Deployed successfully"