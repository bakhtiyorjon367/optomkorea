name: Deploy optomkorea API to EC2

on:
  push:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build check on GitHub runner
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NestJS API
        run: pnpm --filter @koruz/api build

  # ─────────────────────────────────────────
  # JOB 2 — Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    needs: build                 # only deploys if build passes
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e    # stop on any error

            APP_DIR=/home/ubuntu/optomkorea
            API_DIR=$APP_DIR/apps/api

            # ── Use system Node 20 (installed via apt) ──────────
            export PATH="/usr/bin:$PATH"
            node -v   # confirm Node version in logs

            # ── Clone repo on first deploy ───────────────────────
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone ${{ secrets.REPO_URL }} $APP_DIR
            fi

            cd $APP_DIR
            git pull origin main

            # ── Write .env into apps/api/ ────────────────────────
            cat > $API_DIR/.env << 'ENVEOF'
            PORT=${{ secrets.PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            CLIENT_URL=${{ secrets.CLIENT_URL }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_DB_NAME=${{ secrets.MONGODB_DB_NAME }}
            ENVEOF

            # ── Ensure pnpm is available ─────────────────────────
            which pnpm || sudo npm install -g pnpm

            # ── Install all workspace dependencies ───────────────
            pnpm install --frozen-lockfile

            # ── Build NestJS API ─────────────────────────────────
            pnpm --filter @koruz/api build

            # ── PM2: restart if running, start fresh if not ──────
            if pm2 list | grep -q "optomkorea"; then
              pm2 restart optomkorea
            else
              pm2 start $API_DIR/dist/main.js --name "optomkorea" --cwd $API_DIR
            fi

            pm2 save
            echo "✅ optomkorea API deployed successfully"